name: pricingengine-local

services:

  pricingengine-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pricingengine-sql
    restart: unless-stopped
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "${SQL_PORT}:1433"
    volumes:
      - pricingengine-sql-data:/var/opt/mssql
    networks:
      - pricingengine-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD} -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pricingengine-rabbitmq:
    image: rabbitmq:3-management
    container_name: pricingengine-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS}"
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"
    volumes:
      - pricingengine-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - pricingengine-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  pricingengine-api:
    build:
      context: ..
      dockerfile: src/PricingEngine.Startup/Dockerfile
    container_name: pricingengine-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=pricingengine-sql,1433;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True;"
      RabbitMq__Host: pricingengine-rabbitmq
      RabbitMq__VirtualHost: /
      RabbitMq__Username: "${RABBITMQ_USER}"
      RabbitMq__Password: "${RABBITMQ_PASS}"
    depends_on:
      pricingengine-sql:
        condition: service_healthy
      pricingengine-rabbitmq:
        condition: service_healthy
    networks:
      - pricingengine-network

networks:
  pricingengine-network:
    name: pricingengine-network

volumes:
  pricingengine-sql-data:
    name: pricingengine-sql-data
  pricingengine-rabbitmq-data:
    name: pricingengine-rabbitmq-data
